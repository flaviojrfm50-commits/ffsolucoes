<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vitrine</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      transition: 0.3s;
    }

    .topo {
      background: #000;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      transition: 0.3s;
    }

    .logo-box {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-box > div {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo-box img {
      height: 65px;
      width: auto;
      max-height: 65px;
      object-fit: contain;
      background: #fff;
      padding: 4px;
      border-radius: 8px;
      display: none;
    }

    #nomeLoja {
      color: #fff;
      font-weight: bold;
      font-size: 20px;
      line-height: 1.2;
    }

    .banner {
      position: fixed;
      top: 110px;
      left: 0;
      width: 100%;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #fff;
      z-index: 999;
      overflow: hidden;
      text-align: center;
      transition: 0.3s;
    }

    .banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .categorias {
      position: fixed;
      top: 220px;
      width: 100%;
      background: #fff;
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 10px;
      z-index: 998;
      border-bottom: 1px solid #ddd;
    }

    .categorias button {
      padding: 6px 12px;
      border: none;
      border-radius: 20px;
      background: #eee;
      cursor: pointer;
      white-space: nowrap;
    }

    .categorias button.ativo {
      background: #0071e3;
      color: #fff;
    }

    .aviso-funcionamento {
      margin-top: 290px;
      margin-left: 10px;
      margin-right: 10px;
      margin-bottom: 5px;
      background: #fff8e1;
      border: 1px solid #facc15;
      color: #92400e;
      padding: 14px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
      display: none;
    }

    .aviso-funcionamento h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }

    .aviso-funcionamento p {
      margin: 4px 0;
      font-size: 14px;
      line-height: 1.4;
    }

    .produtos {
      margin-top: 290px;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    body.com-aviso .produtos {
      margin-top: 10px;
    }

    @media (min-width: 768px) {
      .produtos {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .produtos {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .card {
      background: #fff;
      border-radius: 15px;
      padding: 12px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: 0.3s;
    }

    .img-produto {
      width: 130px;
      height: 130px;
      object-fit: contain;
    }

    .mini-img {
      width: 45px;
      height: 45px;
      object-fit: cover;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .mini-img:hover {
      border-color: #0071e3;
    }

    .preco {
      font-weight: bold;
      color: #0071e3;
    }

    .btn-add {

      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #0071e3;
      color: #fff;
      cursor: pointer;
    }

    #btnCarrinho {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #0071e3;
      color: #fff;
      border: none;
      padding: 12px 18px;
      border-radius: 50px;
      cursor: pointer;
      z-index: 9999;
    }

    #btnComprarNovamente {
      position: fixed;
      bottom: 75px;
      right: 20px;
      background: #16a34a;
      color: #fff;
      border: none;
      padding: 12px 18px;
      border-radius: 50px;
      cursor: pointer;
      z-index: 9999;
      display: none;

    .tema-natal {

    }

    .tema-natal .topo {
      background: #006400;
    }

    .tema-natal .banner {

    .tema-natal .card {

    .tema-natal .preco {

      background: #006400;
      color: #fff;

    .tema-anonovo {

    .tema-anonovo .topo {
      background: #111827;
    }

    .tema-anonovo .banner {
      background: #000;
    }

    .tema-anonovo .card {
      border: 2px solid #facc15;
    }

    .tema-anonovo .preco {
      color: #facc15;

    .tema-anonovo .btn-add,
    .tema-anonovo #btnCarrinho,
    .tema-anonovo #btnComprarNovamente,

      background: #facc15;
      color: #000;

    .tema-capivara {
      background: #f4b400;
    }

    .tema-capivara .topo {
      background: #6b2e1a;

    .tema-capivara .btn-add {

    .tema-capivara #btnCarrinho,

    .tema-capivara .categorias button.ativo {

      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    .modal-conteudo {
      background: #fff;
      width: 95%;
      max-width: 500px;
      height: 90vh;
      overflow-y: auto;
      border-radius: 20px;
      padding: 20px;
      position: relative;
    }

    .fechar-modal {
      position: sticky;
      top: 0;
      float: right;
      font-size: 22px;
      cursor: pointer;
      background: #fff;
      padding: 4px 6px;
      border-radius: 6px;
      z-index: 10;
    }

    input,

      padding: 8px;

    @media (min-width: 768px) {

    .sugestao-item {

      border-radius: 12px;
      padding: 10px;
      text-align: center;
    }

    .sugestao-item img {

      height: 90px;

    }

    .sugestao-item .nome {

      font-weight: bold;

    }

    .sugestao-item .preco {
      font-size: 14px;
      margin: 6px 0;
    }

    .sugestao-item button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: #0071e3;
      color: #fff;
      cursor: pointer;
    }

    .botao-qtd {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      -webkit-text-size-adjust: 100%;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    input,
    textarea,

    }

    .modal-conteudo {
      width: calc(100% - 20px);

    @media (max-width: 600px) {

      }

      .logo-box img {
        height: 50px;
        max-height: 50px;
      }

      #nomeLoja {
        font-size: 16px;
      }

      #infoLoja {
        font-size: 12px !important;
      }

      .banner {
        top: 82px;
        height: 85px;
      }

      .categorias {
        top: 167px;
        padding: 8px;
        gap: 8px;
      }

      .categorias button {
        font-size: 13px;
        padding: 6px 10px;
      }

      .aviso-funcionamento {
        margin-top: 225px;
        margin-left: 8px;
        margin-right: 8px;
        padding: 12px;
      }

      .produtos {
        margin-top: 225px;

        gap: 8px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      body.com-aviso .produtos {
        margin-top: 8px;
      }

      .card {
        padding: 10px;
        border-radius: 12px;
      }

      .img-produto {
        width: 100%;
        max-width: 100px;
        height: 100px;
      }

      .mini-img {
        width: 32px;
        height: 32px;
      }

      .card h4 {
        font-size: 13px;
        line-height: 1.3;
        margin: 8px 0 6px;
        word-break: break-word;
      }

      .preco {
        font-size: 14px;
      }

      .btn-add {
        padding: 9px;
        font-size: 14px;
      }

      #btnCarrinho,
      #btnComprarNovamente {
        right: 14px;
        padding: 10px 14px;
        font-size: 14px;
      }

      #btnCarrinho {
        bottom: 14px;
      }

      #btnComprarNovamente {
        bottom: 64px;
      }

      .modal-conteudo {
        width: calc(100% - 12px);
        padding: 14px;
        border-radius: 14px 14px 0 0;
      }
    }

    @media (max-width:600px){
      .modal-conteudo{
        height: 85vh;
        padding: 14px;
        border-radius:16px 16px 0 0;
      }

      .modal-conteudo h2{
        font-size:18px;
      }

      input{
        padding:7px;
      }

      .btn-add{
        padding:10px;
        font-size:14px;
      }
    }
  </style>
</head>

const params = new URLSearchParams(window.location.search);
const app_id_url = params.get("app_id");
const partes = location.pathname.split("/").filter(Boolean);
const slug = partes[partes.length - 1];

const URL_PAGAMENTO = `${SUPABASE_URL}/functions/v1/criar-pagamento-loja`;

        style: "currency",

      return String(valor || "").replace(/\D/g, "");

    function obterTextoVariacao(v) {
      const tipo = String(v?.tipo || "").trim();
      const valor = String(v?.valor || "").trim();

      if (tipo && valor) return `${tipo}: ${valor}`;
      if (valor) return valor;
      if (tipo) return tipo;

      return "Variação";

    function obterRotuloVariacoes(variacoes) {
      if (!variacoes.length) return "variação";

      const tipos = [...new Set(
        variacoes.map(v => String(v?.tipo || "").trim()).filter(Boolean)
      )];

      if (tipos.length === 1) {
        return tipos[0].toLowerCase();
      }

      return "variação";
    }

    function obterPrecoVariacao(produto, variacao) {
      if (variacao?.preco !== null && variacao?.preco !== undefined && variacao?.preco !== "") {
        return Number(variacao.preco || 0);

      return Number(produto?.preco || 0);
    }

    function gerarCodigoAcompanhamento() {
      const letras = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let codigo = "PED-";

      for (let i = 0; i < 8; i++) {
        codigo += letras.charAt(Math.floor(Math.random() * letras.length));
      }

      return codigo;
    }

    async function criarPagamentoPixMP(pedidoId, total, cliente = {}) {
      const valorFinal = Number(Number(total || 0).toFixed(2));

      if (!APP_ID) throw new Error("APP_ID ausente");
      if (!pedidoId) throw new Error("pedidoId ausente");
      if (!Number.isFinite(valorFinal) || valorFinal <= 0) {
        throw new Error("transaction_amount inválido antes de enviar");
      }

      const payload = {
        appId: String(APP_ID),
        pedidoId: String(pedidoId),
        transaction_amount: valorFinal,
        description: `Pedido ${pedidoId}`,
        payerEmail: cliente.email || "cliente@cliente.com"
      };

      const res = await fetch(URL_PAGAMENTO_PIX, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          apikey: SUPABASE_ANON_KEY
        },
        body: JSON.stringify(payload)
      });

      const json = await res.json().catch(() => ({}));

      if (!res.ok) {
        throw new Error(
          json?.detalhes?.message ||
          json?.erro ||
          "Erro ao gerar PIX"
        );
      }

      return json;
    }

    function adicionarSugestaoDireto(produto) {
      if (!podeVenderAgora()) {
        alert("No momento a loja está apenas em modo vitrine.");
        return;
      }

      const variacoes = obterVariacoesProduto(produto);

      let variacaoFinal = "Padrão";
      let precoFinal = Number(produto.preco || 0);

      if (variacoes.length > 0) {
        const disponivel = variacoes.find((v) => Number(v.estoque || 0) > 0);

        if (!disponivel) {
          alert("Esse produto complementar está sem estoque.");
          return;
        }

        variacaoFinal = String(disponivel.valor || "Padrão");
        precoFinal = obterPrecoVariacao(produto, disponivel);
      } else {
        const estoqueGeral = Number(produto.estoque || 0);
        if (estoqueGeral <= 0) {
          alert("Esse produto complementar está sem estoque.");
          return;
        }
      }

      const existente = carrinho.find(
        (i) =>
          String(i.id) === String(produto.id) &&
          i.variacao === variacaoFinal &&
          Number(i.preco || 0) === Number(precoFinal || 0)
      );

      if (existente) {
        existente.qtd++;
      } else {
        carrinho.push({
          ...produto,
          qtd: 1,
          variacao: variacaoFinal,
          preco: precoFinal
        });
      }

      
      abrirCarrinho();
    }

    function renderizarSugestoesCarrinho() {
      const area = document.getElementById("sugestoesCarrinhoArea");
      if (!area) return;

      if (!carrinho.length) {
        area.innerHTML = "";
        return;
      }

      const idsNoCarrinho = carrinho.map((i) => String(i.id));
      let sugestoes = [];

      carrinho.forEach((item) => {
        const idsComplementares = obterIdsComplementares(item);

        idsComplementares.forEach((idComp) => {
          const prod = todosProdutos.find((p) => String(p.id) === String(idComp));

          if (
            prod &&
            !idsNoCarrinho.includes(String(prod.id)) &&
            !sugestoes.some((s) => String(s.id) === String(prod.id))
          ) {
            sugestoes.push(prod);
          }
        });
      });

      sugestoes = sugestoes.slice(0, 6);

      if (!sugestoes.length) {
        area.innerHTML = "";
        return;
      }

      area.innerHTML = `
        <div class="sugestoes-carrinho">
          <h3>🔥 Leve também</h3>
          <div class="lista-sugestoes">
            ${sugestoes.map((p) => `
              <div class="sugestao-item">

            `).join("")}
          </div>
        </div>
      `;
    }

        RO: "RO", RONDONIA: "RO", "RONDÔNIA": "RO",
        RR: "RR", RORAIMA: "RR",
        SC: "SC", "SANTA CATARINA": "SC",
        SP: "SP", "SAO PAULO": "SP", "SÃO PAULO": "SP",
        SE: "SE", SERGIPE: "SE",
        TO: "TO", TOCANTINS: "TO"
      };

      return mapa[valor] || "";
    }

    function obterRegiaoPorUF(uf) {
      const norte = ["AC", "AP", "AM", "PA", "RO", "RR", "TO"];
      const nordeste = ["AL", "BA", "CE", "MA", "PB", "PE", "PI", "RN", "SE"];
      const centroOeste = ["DF", "GO", "MT", "MS"];
      const sudeste = ["ES", "MG", "RJ", "SP"];
      const sul = ["PR", "RS", "SC"];

      if (norte.includes(uf)) return "norte";
      if (nordeste.includes(uf)) return "nordeste";
      if (centroOeste.includes(uf)) return "centro-oeste";
      if (sudeste.includes(uf)) return "sudeste";
      if (sul.includes(uf)) return "sul";

      return "";
    }

    function calcularPesoCarrinho() {
      let pesoTotal = 0;

      carrinho.forEach((item) => {
        const freteGratis = item.frete_gratis === true || Number(item.peso || 0) <= 0;
        if (freteGratis) return;

        const pesoItem = Number(item.peso || 0);
        const qtdItem = Number(item.qtd || 1);

        pesoTotal += pesoItem * qtdItem;
      });

      return pesoTotal;
    }

      return {

    function calcularValorFretePorPesoERegiao(uf, pesoTotal) {
      const regiao = obterRegiaoPorUF(uf);
      const tabela = obterTabelaFrete();

      if (!regiao || !tabela[regiao]) {
        return { erro: "Estado inválido para cálculo de frete." };
      }

      const faixas = tabela[regiao];
      const faixa = faixas.find((f) => pesoTotal <= f.ate);

      if (!faixa) {
        return { erro: "Peso acima do limite de entrega automática." };
      }

      return {
        uf,
        regiao,
        pesoTotal,
        valor: faixa.valor
      };
    }

    window.calcularFrete = function () {
      const estadoInformado = document.getElementById("clienteEstado").value;
      const uf = normalizarEstado(estadoInformado);
      const pesoTotal = calcularPesoCarrinho();
      const area = document.getElementById("freteResultado");

      if (!uf) {
        valorFrete = 0;
        area.innerHTML = "Informe um estado válido para calcular o frete.";
        atualizarResumoCarrinho();
        return;
      }

      if (pesoTotal <= 0) {
        valorFrete = 0;
        area.innerHTML = `
          <div style="color:green;font-weight:bold;">
            🚚 Frete grátis para este pedido
          </div>
        `;
        atualizarResumoCarrinho();
        return;
      }

      const resultado = calcularValorFretePorPesoERegiao(uf, pesoTotal);

      if (resultado.erro) {
        valorFrete = 0;
        area.innerHTML = resultado.erro;
        atualizarResumoCarrinho();
        return;
      }

      valorFrete = Number(resultado.valor || 0);

      area.innerHTML = `
        <div>Estado: <strong>${resultado.uf}</strong></div>
        <div>Região: <strong>${resultado.regiao}</strong></div>
        <div>Peso total: <strong>${resultado.pesoTotal.toFixed(2)} kg</strong></div>
        <div>Frete: <strong>${formatarReal(valorFrete)}</strong></div>
      `;

      atualizarResumoCarrinho();
    };

    function calcularFreteSePossivel() {
      const estadoInformado = document.getElementById("clienteEstado")?.value || "";
      const uf = normalizarEstado(estadoInformado);

      if (!uf) {
        valorFrete = 0;
        return;
      }

      const pesoTotal = calcularPesoCarrinho();
      const resultado = calcularValorFretePorPesoERegiao(uf, pesoTotal);

      if (resultado.erro) {
        valorFrete = 0;
        return;
      }

      valorFrete = Number(resultado.valor || 0);
    }

    async function criarPagamentoMP(pedidoId, itens) {
      const payload = {
        appId: APP_ID,
        pedidoId,
        items: itens
          .map((i) => ({
            title: String(`${i.nome || "Produto"} (${i.variacao || "Padrão"})`).slice(0, 120),
            quantity: Number(i.qtd || 1),
            unit_price: Number(i.preco || 0)
          }))
          .filter((i) => i.quantity > 0 && i.unit_price > 0)
      };

      const res = await fetch(URL_PAGAMENTO, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          apikey: SUPABASE_ANON_KEY
        },
        body: JSON.stringify(payload)
      });

      const json = await res.json().catch(() => ({}));

      if (!res.ok) {
        const detalhe =
          json?.detalhes?.message ||
          json?.detalhes?.cause?.[0]?.description ||
          json?.detalhes?.error ||
          json?.detalhes?.status ||
          JSON.stringify(json?.detalhes || {});

        throw new Error(
          `${json?.erro || `Falha ao criar pagamento (${res.status})`} | Detalhe: ${detalhe}`
        );
      }

      return json;
    }

    async function validarEstoqueCarrinho() {
      let subtotal = 0;

      for (const item of carrinho) {
        const { data: produtoBanco, error: prodErr } = await supabase
          .from("produtos")
          .select("estoque, variacoes")
          .eq("id", item.id)
          .single();

        if (prodErr || !produtoBanco) {
          alert(`Erro ao consultar produto: ${item.nome}`);
          return null;
        }

        let variacoes = [];
        try {
          variacoes = JSON.parse(produtoBanco.variacoes || "[]");
        } catch {
          variacoes = [];
        }

        const variacaoItem = item.variacao || "Padrão";

        if (variacoes.length > 0) {
          const idx = variacoes.findIndex((v) => String(v.valor || "Padrão") === variacaoItem);

          if (idx === -1 || Number(variacoes[idx].estoque || 0) < Number(item.qtd || 1)) {
            alert(`Estoque insuficiente para ${item.nome} (${variacaoItem})`);
            return null;
          }
        } else {
          if (Number(produtoBanco.estoque || 0) < Number(item.qtd || 1)) {
            alert(`Estoque insuficiente para ${item.nome}`);
            return null;
          }
        }

        subtotal += Number(item.preco || 0) * Number(item.qtd || 1);
      }

      return subtotal;
    }

      }

      if (!carrinho.length) return;

      const statusLoja = await verificarLojaFechadaServidor();
      if (statusLoja.modo !== "aberta") {
        alert(statusLoja.mensagem);
        return;
      }

      if (modoVenda === "whatsapp") {
        await window.finalizarPedidoWhatsApp();
        return;
      }

      const codigoAcompanhamento = gerarCodigoAcompanhamento();
      const nome = document.getElementById("clienteNome").value.trim();
      const telefone = document.getElementById("clienteTelefone").value.trim();

      if (!nome || !telefone) {
        alert("Preencha nome e telefone.");
        return;
      }

      const subtotal = await validarEstoqueCarrinho();
      if (subtotal === null) return;

      const estadoInformado = document.getElementById("clienteEstado").value;
      const ufFrete = normalizarEstado(estadoInformado);

      if (!ufFrete) {
        alert("Informe o estado para calcular o frete.");
        return;
      }

      const pesoTotalPedido = calcularPesoCarrinho();
      let resultadoFrete = { valor: 0, regiao: "", erro: null };

      if (pesoTotalPedido > 0) {
        resultadoFrete = calcularValorFretePorPesoERegiao(ufFrete, pesoTotalPedido);

        if (resultadoFrete.erro) {
          alert(resultadoFrete.erro);
          return;
        }
      }

      valorFrete = Number(resultadoFrete?.valor || 0);

      const subtotalFinal = Number(subtotal || 0);
      const total = Number((subtotalFinal + valorFrete).toFixed(2));

      if (!Number.isFinite(total) || total <= 0) {
        alert("Total inválido para gerar PIX.");
        return;
      }

      const pagamentoModoInicial =
        modoEscolhido === "pix_mp" ? "mercadopago_pix" : "mercadopago";

      const pagamentoTipoInicial =
        modoEscolhido === "pix_mp" ? "pix" : "checkout_online";

      const { data: pedidoCriado, error } = await supabase
        .from("pedidos")
        .insert([
          {
            app_id: APP_ID,
            cliente_nome: nome,
            cliente_telefone: telefone,
            cliente_rua: document.getElementById("clienteRua").value,
            cliente_numero: document.getElementById("clienteNumero").value,
            cliente_bairro: document.getElementById("clienteBairro").value,
            cliente_cidade: document.getElementById("clienteCidade").value,
            cliente_estado: document.getElementById("clienteEstado").value,
            cliente_cep: document.getElementById("clienteCep").value,
            cliente_localizacao: document.getElementById("clienteLocalizacao").value,
            itens: carrinho,
            total: Number(total),
            subtotal: Number(subtotalFinal),
            frete_valor: Number(valorFrete || 0),
            frete_uf: ufFrete,
            frete_regiao: resultadoFrete.regiao,
            frete_peso_total: Number(pesoTotalPedido || 0),
            status: "aguardando_pagamento",
            pagamento_modo: pagamentoModoInicial,
            pagamento_tipo: pagamentoTipoInicial,
            pagamento_status: "pending",
            codigo_acompanhamento: codigoAcompanhamento,
            status_entrega: "Pedido recebido"
          }
        ])
        .select("id")
        .single();

      if (error || !pedidoCriado?.id) {
        alert("Erro ao salvar pedido.");
        return;
      }

      const pedidoId = String(pedidoCriado.id);
      const linkAcompanhamento = `${window.location.origin}/celular/acompanhar.html?codigo=${encodeURIComponent(codigoAcompanhamento)}`;

      if (modoEscolhido === "pix_mp") {
        try {
          const pagamento = await criarPagamentoPixMP(pedidoId, total, {});

          const qrBase64 = pagamento?.qr_code_base64 || "";
          const copiaCola = pagamento?.qr_code || "";
          const ticketUrl = pagamento?.ticket_url || "";

          await supabase
            .from("pedidos")
            .update({
              pagamento_modo: "mercadopago_pix",
              pagamento_tipo: "pix",
              pagamento_status: pagamento.status || "pending",
              mp_payment_id: String(pagamento.id || ""),
              mp_qr_code: copiaCola || null,
              mp_ticket_url: ticketUrl || null,
              status: "aguardando_pagamento"
            })
            .eq("id", pedidoId);

          document.getElementById("pixCopiaCola").value = copiaCola || "";

          document.getElementById("pixQrCodeArea").innerHTML = qrBase64
            ? `<img src="data:image/png;base64,${qrBase64}" style="max-width:240px; width:100%;">`
            : ticketUrl
              ? `<a href="${ticketUrl}" target="_blank">Abrir pagamento PIX</a>`
              : "PIX gerado.";

          document.getElementById("statusPagamento").innerHTML = `
            <div style="
              background:#fff7ed;
              border:1px solid #fdba74;
              color:#9a3412;
              padding:12px;
              border-radius:12px;
              margin-top:10px;
              white-space:pre-line;
            ">
              ⏳ PIX gerado.

              Valor do pedido: ${formatarReal(total)}

              Aguardando pagamento...
            </div>

            <div style="
              margin-top:12px;
              padding:12px;
              border:1px solid #dbeafe;
              background:#eff6ff;
              border-radius:12px;
              color:#1e3a8a;
            ">
              <div><strong>Código do pedido:</strong> ${codigoAcompanhamento}</div>

              <div style="margin-top:8px; word-break:break-all;">
                <strong>Link para acompanhar:</strong><br>
                <a href="${linkAcompanhamento}" target="_blank">${linkAcompanhamento}</a>
              </div>

              <button onclick="copiarLinkPedido('${linkAcompanhamento}')"
                style="
                  margin-top:10px;
                  padding:8px 12px;
                  border:none;
                  border-radius:8px;
                  background:#2563eb;
                  color:#fff;
                  cursor:pointer;
                ">
                📋 Copiar link do pedido
              </button>
            </div>
          `;

          iniciarVerificacaoPix(pedidoId, codigoAcompanhamento);
          alert("✅ PIX gerado com sucesso.");
          return;
        } catch (e) {
          alert("Erro ao gerar PIX: " + e.message);
          return;
        }
      }

      if (modoEscolhido === "mercadopago") {
        try {
          const pagamento = await criarPagamentoMP(pedidoId, carrinho);

          await supabase
            .from("pedidos")
            .update({
              pagamento_modo: "mercadopago",
              pagamento_tipo: "checkout_online",
              pagamento_status: "pending",
              mp_preference_id: pagamento.id || null,
              status: "aguardando_pagamento"
            })
            .eq("id", pedidoId);

          const linkPagamento = pagamento.init_point || pagamento.sandbox_init_point;

          if (!linkPagamento) {
            alert("Mercado Pago não retornou o link.");
            return;
          }

          window.location.href = linkPagamento;
          return;
        } catch (e) {
          alert("Erro ao gerar pagamento: " + e.message);
          return;
        }
      }
    };

    window.copiarLinkPedido = function(link) {
      navigator.clipboard.writeText(link);
      alert("📋 Link do pedido copiado!");
    };

    resolverAppId();
  </script>
</body>
</html>
