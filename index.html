<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Conecta | Login Passagens</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

:root{
  --bg:#f3f4f6;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --line:#e5e7eb;
  --primary:#251f7f;
  --primary-2:#6b21a8;
  --green:#22c55e;
  --green-2:#16a34a;
  --red:#ef4444;
  --blue:#2563eb;
  --gray:#475569;
}

body{
  margin:0;
  min-height:100vh;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#f8fafc 0%, #eef2f7 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  color:var(--text);
}

.login-wrap{
  width:100%;
  max-width:430px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:28px;
  padding:28px 24px;
  box-shadow:0 20px 50px rgba(15,23,42,.10);
}

.logo-box{
  text-align:center;
  margin-bottom:18px;
}

.logo-box img{
  width:240px;
  max-width:100%;
  height:auto;
  display:block;
  margin:0 auto 12px;
}

.titulo{
  margin:0;
  text-align:center;
  font-size:30px;
  color:var(--primary);
  font-weight:900;
  letter-spacing:.2px;
}

.subtitulo{
  margin:8px 0 0;
  text-align:center;
  font-size:14px;
  color:var(--muted);
}

input,button{
  width:100%;
  border:none;
  border-radius:16px;
  padding:15px 16px;
  font-size:16px;
  margin-top:12px;
}

input{
  background:#f3f4f6;
  color:#111827;
  outline:none;
  border:1px solid #e5e7eb;
}

input:focus{
  border-color:#c4b5fd;
  box-shadow:0 0 0 3px rgba(107,33,168,.10);
}

button{
  cursor:pointer;
  font-weight:700;
}

.btn-entrar{
  margin-top:16px;
  background:linear-gradient(135deg,var(--primary),var(--primary-2));
  color:#fff;
  box-shadow:0 10px 24px rgba(37,31,127,.18);
}

.btn-entrar:disabled{
  opacity:.7;
  cursor:not-allowed;
}

.link{
  margin-top:14px;
  text-align:center;
  color:var(--primary-2);
  cursor:pointer;
  font-size:15px;
  font-weight:700;
}

.aviso-plano{
  margin-top:18px;
  background:#f8fafc;
  border:1px solid #e5e7eb;
  padding:18px;
  border-radius:18px;
  text-align:left;
  color:#111827;
  font-size:14px;
  line-height:1.45;
}

.aviso-titulo{
  font-weight:800;
  margin-bottom:8px;
  font-size:15px;
}

.aviso-texto{
  color:#64748b;
  margin-bottom:14px;
}

.btn-renovar{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,var(--blue),#1d4ed8);
  color:#fff;
  font-weight:700;
  cursor:pointer;
  margin-top:6px;
}

.btn-continuar{
  width:100%;
  padding:12px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,var(--gray),#334155);
  color:#fff;
  font-weight:700;
  cursor:pointer;
  margin-top:10px;
}

/* SUPORTE */
#chatBotao{
  position:fixed;
  bottom:20px;
  left:20px;
  min-height:56px;
  padding:0 18px;
  background:linear-gradient(135deg,var(--primary),var(--primary-2));
  color:#fff;
  border-radius:50px;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:16px;
  cursor:pointer;
  z-index:9999;
  box-shadow:0 12px 30px rgba(0,0,0,.18);
  font-weight:700;
}

#chatBotao span{
  font-size:14px;
}

#chatBotao.oculto{
  display:none;
}

#chatBox{
  position:fixed;
  bottom:90px;
  left:20px;
  width:360px;
  max-width:calc(100vw - 24px);
  height:520px;
  max-height:calc(100vh - 120px);
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  display:none;
  flex-direction:column;
  z-index:9999;
  box-shadow:0 16px 40px rgba(0,0,0,.22);
  border:1px solid #e5e7eb;
}

#chatBox.ativo{
  display:flex;
}

#chatTopo{
  background:linear-gradient(135deg,var(--primary),var(--primary-2));
  color:#fff;
  padding:12px 14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:700;
}

#chatTopo button{
  width:auto;
  margin-top:0;
  padding:0;
  background:none;
  border:none;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  line-height:1;
  box-shadow:none;
}

#ffChatFrame{
  width:100%;
  height:100%;
  flex:1;
  border:none;
  background:#fff;
}

#chatNomeOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.60);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10000;
  padding:16px;
}

#chatNomeOverlay.ativo{
  display:flex;
}

.chatNomeBox{
  background:#fff;
  padding:20px;
  border-radius:16px;
  width:320px;
  max-width:100%;
  text-align:center;
  border:1px solid #e5e7eb;
  box-shadow:0 18px 40px rgba(0,0,0,.20);
}

.chatNomeBox h3{
  margin:0 0 10px;
  color:var(--primary);
}

.chatNomeBox input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
}

.chatNomeBox button{
  margin-top:12px;
  width:100%;
  padding:12px;
  background:linear-gradient(135deg,var(--primary),var(--primary-2));
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:700;
}

#chatNomeStatus{
  min-height:18px;
  margin-top:10px;
  color:#dc2626;
  font-size:13px;
}

@media (max-width:700px){
  .card{
    padding:24px 18px;
    border-radius:22px;
  }

  .titulo{
    font-size:26px;
  }

  #chatBotao{
    left:14px;
    bottom:14px;
  }

  #chatBox{
    left:12px;
    right:12px;
    bottom:80px;
    width:auto;
    height:70vh;
    max-height:70vh;
  }
}
</style>
</head>

<body>

<div class="login-wrap">
  <div class="card">
    <div class="logo-box">
      <img src="./assets/logo-conecta.png" alt="Conecta Soluções Inteligentes">
      <h1 class="titulo">Login Passagens</h1>
      <div class="subtitulo">Acesso administrativo do sistema de passagens</div>
    </div>

    <input id="usuario" placeholder="E-mail">
    <input id="senha" type="password" placeholder="Senha">
    <button id="btnEntrar" class="btn-entrar" onclick="login()">Entrar</button>

    <div class="link" onclick="resetSenha()">Esqueci minha senha</div>
  </div>
</div>

<div id="chatBotao" onclick="abrirModalNomeChat()">
  💬 <span>Suporte</span>
</div>

<div id="chatBox">
  <div id="chatTopo">
    <span>Conecta Suporte</span>
    <button type="button" onclick="fecharChat()">✕</button>
  </div>
  <iframe id="ffChatFrame" title="Chat Conecta"></iframe>
</div>

<div id="chatNomeOverlay">
  <div class="chatNomeBox">
    <h3>Digite seu nome</h3>
    <input id="chatNomeCliente" placeholder="Seu nome">
    <div id="chatNomeStatus"></div>
    <button type="button" onclick="confirmarEntradaChat()">Entrar no chat</button>
  </div>
</div>

<script type="module">
import { supabase } from "./js/supabase.js";

function getBasePath(){
  return "/ffsolucoes";
}

function removerAvisoPlano(){
  const aviso = document.getElementById("avisoPlano");
  if(aviso) aviso.remove();
}

function mostrarAvisoPlano(dias, destinoPainel, expirado = false){
  removerAvisoPlano();

  const box = document.createElement("div");
  box.id = "avisoPlano";
  box.className = "aviso-plano";

  const corTitulo = expirado ? "#dc2626" : (dias <= 3 ? "#d97706" : "#2563eb");
  const titulo = expirado
    ? "⚠️ Seu plano expirou"
    : `⚠️ Seu plano vence em ${dias} dia(s)`;

  const texto = expirado
    ? "Seu acesso pode ser bloqueado. Renove agora para continuar usando o sistema."
    : "Para evitar bloqueio, renove agora. Após o pagamento você recebe a liberação do acesso.";

  box.innerHTML = `
    <div class="aviso-titulo" style="color:${corTitulo}">
      ${titulo}
    </div>
    <div class="aviso-texto">
      ${texto}
    </div>
    <button id="btnRenovarAgora" class="btn-renovar">Renovar agora</button>
    ${!expirado ? '<button id="btnContinuarPainel" class="btn-continuar">Continuar para o painel</button>' : ''}
  `;

  const card = document.querySelector(".card");
  card.appendChild(box);

  document.getElementById("btnRenovarAgora").onclick = () => {
    window.location.href = getBasePath() + "/pagamento/renovar.html";
  };

  if(!expirado){
    const btnContinuar = document.getElementById("btnContinuarPainel");
    if(btnContinuar){
      btnContinuar.onclick = () => {
        window.location.href = destinoPainel;
      };
    }
  }
}

function normalizarDataExpiracao(origem){
  return origem?.data_expiracao ||
         origem?.expira_em ||
         origem?.vencimento ||
         origem?.vencimento_em ||
         origem?.trial_fim_em ||
         origem?.demo_expira_em ||
         origem?.plano_expira_em ||
         null;
}

function montarDestinoPainel(usuarioSistema){
  const tipo = String(usuarioSistema?.tipo || "").trim().toLowerCase();

  if(tipo === "cobrador"){
    return "/ffsolucoes/passagens/cobrador.html";
  }

  return "/ffsolucoes/passagens/admin.html";
}

async function buscarAppLegado(appId){
  if(!appId) return null;

  const { data, error } = await supabase
    .from("apps")
    .select("*")
    .eq("id", appId)
    .maybeSingle();

  if(error){
    console.warn("Falha ao buscar apps legado:", error);
    return null;
  }

  return data || null;
}

async function login(){
  removerAvisoPlano();

  const email = document.getElementById("usuario").value.trim().toLowerCase();
  const senha = document.getElementById("senha").value.trim();
  const btnEntrar = document.getElementById("btnEntrar");

  if(!email || !senha){
    alert("Preencha e-mail e senha");
    return;
  }

  btnEntrar.disabled = true;
  btnEntrar.textContent = "Entrando...";

  try{
    const { data, error } = await supabase.auth.signInWithPassword({
      email,
      password: senha
    });

    if(error){
      alert("Credenciais inválidas");
      return;
    }

    const userId = data.user.id;

    const { data: usuarioSistema, error: uErr } = await supabase
      .from("usuarios")
      .select("*")
      .eq("id", userId)
      .single();

    if(uErr || !usuarioSistema){
      alert("Usuário não encontrado no sistema.");
      return;
    }

    const appLegado = await buscarAppLegado(usuarioSistema.app_id);
    const destinoPainel = montarDestinoPainel(usuarioSistema);

    const dataExpiracao =
      normalizarDataExpiracao(usuarioSistema) ||
      normalizarDataExpiracao(appLegado);

    const ativo =
      typeof usuarioSistema?.ativo === "boolean"
        ? usuarioSistema.ativo
        : (typeof appLegado?.ativo === "boolean" ? appLegado.ativo : true);

    const hoje = new Date();
    const expiracao = dataExpiracao ? new Date(dataExpiracao) : null;

    if(ativo === false){
      mostrarAvisoPlano(0, destinoPainel, true);
      return;
    }

    if(!expiracao || isNaN(expiracao.getTime())){
      mostrarAvisoPlano(0, destinoPainel, true);
      return;
    }

    const diffMs = expiracao.getTime() - hoje.getTime();
    const dias = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

    if(dias <= 0){
      mostrarAvisoPlano(0, destinoPainel, true);
      return;
    }

    if(dias <= 15){
      mostrarAvisoPlano(dias, destinoPainel, false);
      return;
    }

    window.location.href = destinoPainel;

  }catch(err){
    console.error("Erro no login:", err);
    alert("Erro ao entrar.");
  }finally{
    btnEntrar.disabled = false;
    btnEntrar.textContent = "Entrar";
  }
}

async function resetSenha(){
  const email = document.getElementById("usuario").value.trim();

  if(!email){
    alert("Digite seu e-mail primeiro");
    return;
  }

  await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: location.origin + "/ffsolucoes/auth/update-password.html"
  });

  alert("E-mail de recuperação enviado. Verifique sua caixa de entrada ou spam.");
}

window.login = login;
window.resetSenha = resetSenha;
</script>

<script>
const FF_CHAT_USER_KEY = "ff_chat_user";
const FF_CHAT_CONTEXT_KEY = "ff_chat_contexto";
const FF_CHAT_NOME_KEY = "ff_chat_nome_cliente";

function slugTexto(texto){
  return String(texto || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_+|_+$/g, "");
}

function gerarIdAleatorio(prefixo = "chat"){
  return prefixo + "_" + Date.now() + "_" + Math.random().toString(36).slice(2, 10);
}

function abrirModalNomeChat(){
  const overlay = document.getElementById("chatNomeOverlay");
  const input = document.getElementById("chatNomeCliente");
  const status = document.getElementById("chatNomeStatus");

  if(!overlay || !input || !status) return;

  status.textContent = "";
  input.value = "";
  overlay.classList.add("ativo");

  setTimeout(() => input.focus(), 120);
}

function fecharModalNomeChat(){
  const overlay = document.getElementById("chatNomeOverlay");
  if(overlay) overlay.classList.remove("ativo");
}

function fecharChat(){
  const box = document.getElementById("chatBox");
  const frame = document.getElementById("ffChatFrame");
  const botao = document.getElementById("chatBotao");

  if(box) box.classList.remove("ativo");
  if(frame) frame.src = "";
  if(botao) botao.classList.remove("oculto");
}

function montarUsuarioTemporario(nome){
  const nomeLimpo = String(nome || "").trim();
  const slug = slugTexto(nomeLimpo) || "cliente";

  return {
    numero: "visitante_" + slug + "_" + Date.now(),
    senha: gerarIdAleatorio("senha"),
    nome: nomeLimpo,
    tipo: "visitante_temporario",
    sistema: "ffsolucoes",
    criado_em: new Date().toISOString()
  };
}

function montarContextoChat(nome, usuarioTemp){
  return {
    sistema_id: "ffsolucoes",
    sistema_nome: "Conecta",
    origem: "ffsolucoes",
    app_id: null,
    cliente_nome: nome,
    chat_room_id: "ffsolucoes_" + slugTexto(nome) + "_" + Date.now(),
    usuario_temporario: usuarioTemp.numero,
    criado_em: new Date().toISOString()
  };
}

function abrirChatComSessao(){
  const frame = document.getElementById("ffChatFrame");
  const box = document.getElementById("chatBox");
  const botao = document.getElementById("chatBotao");

  if(!frame || !box) return;

  frame.src = "./ff-chat/ffchat-sulocoes.html?auto_login=1&t=" + Date.now();
  box.classList.add("ativo");
  if(botao) botao.classList.add("oculto");
}

function confirmarEntradaChat(){
  const input = document.getElementById("chatNomeCliente");
  const status = document.getElementById("chatNomeStatus");

  if(!input || !status) return;

  const nome = (input.value || "").trim();

  if(!nome){
    status.textContent = "Digite seu nome para continuar.";
    input.focus();
    return;
  }

  try{
    const usuarioTemp = montarUsuarioTemporario(nome);
    const contexto = montarContextoChat(nome, usuarioTemp);

    localStorage.setItem(FF_CHAT_NOME_KEY, nome);
    localStorage.setItem(FF_CHAT_USER_KEY, JSON.stringify(usuarioTemp));
    localStorage.setItem(FF_CHAT_CONTEXT_KEY, JSON.stringify(contexto));

    fecharModalNomeChat();
    abrirChatComSessao();
  }catch(err){
    console.error("Erro ao iniciar chat:", err);
    status.textContent = "Erro ao iniciar o chat.";
  }
}

document.addEventListener("keydown", function(e){
  if(e.key === "Escape"){
    fecharModalNomeChat();
  }
});

document.addEventListener("DOMContentLoaded", function(){
  const inputNome = document.getElementById("chatNomeCliente");
  const botao = document.getElementById("chatBotao");

  if(botao){
    botao.style.display = "flex";
  }

  if(inputNome){
    inputNome.addEventListener("keydown", function(e){
      if(e.key === "Enter"){
        confirmarEntradaChat();
      }
    });
  }
});

window.abrirModalNomeChat = abrirModalNomeChat;
window.fecharChat = fecharChat;
window.confirmarEntradaChat = confirmarEntradaChat;
</script>

</body>
</html>
