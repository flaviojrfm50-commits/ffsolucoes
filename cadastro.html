<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro de Conta</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabase = createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

// SLUG
function gerarSlugBase(texto){
  return String(texto || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "");
}

async function gerarSlugUnico(nome){
  let base = gerarSlugBase(nome) || "loja";
  let slug = base;
  let i = 1;

  while(true){
    const { data } = await supabase
      .from("apps")
      .select("id")
      .eq("slug", slug)
      .maybeSingle();

    if(!data) return slug;

    slug = `${base}-${i++}`;
  }
}

// CRIAR CONTA 30 DIAS
window.criarConta = async () => {

  const nome = document.getElementById("nomeNegocio").value.trim();
  const tipo = document.getElementById("tipoNegocio").value;
  const email = document.getElementById("usuarioAdmin").value.trim().toLowerCase();
  const senha = document.getElementById("senhaAdmin").value.trim();
  const botao = document.getElementById("btnCriar");

  if (!nome || !email || !senha) {
    alert("Preencha todos os campos");
    return;
  }

  if (senha.length < 6) {
    alert("Senha mínima 6 caracteres");
    return;
  }

  botao.disabled = true;
  botao.textContent = "Criando...";

  try {

    // AUTH
    const { data: authData, error: authError } = await supabase.auth.signUp({
      email,
      password: senha
    });

    if (authError) throw authError;
    const userId = authData.user.id;

    // 🔥 VENCIMENTO 30 DIAS
    const vencimento = new Date();
    vencimento.setDate(vencimento.getDate() + 30);

    // SLUG
    const slug = await gerarSlugUnico(nome);

    // APP
    const { data: app, error: appError } = await supabase
      .from("apps")
      .insert({
        nome,
        tipo,
        sistema: tipo,
        slug,
        plano: "ativo",
        data_expiracao: vencimento.toISOString(),
        ativo: true
      })
      .select()
      .single();

    if (appError) throw appError;

    // USUÁRIO
    const { error: usuarioError } = await supabase
      .from("usuarios")
      .insert({
        id: userId,
        nome,
        email,
        tipo: "admin",
        sistema: tipo,
        app_id: app.id,
        ativo: true,
        data_expiracao: vencimento.toISOString()
      });

    if (usuarioError) throw usuarioError;

    // CONFIG
    await supabase.from("config_site").insert({
      app_id: app.id,
      nome_site: nome,
      tema_site: "padrao",
      modo_venda: "whatsapp",
      modo_exibicao: "aberta",
      loja_fechada: false
    });

    // TIPOS

    if (tipo === "gas") {
      await supabase.from("lojas_gas").insert({
        app_id: app.id,
        nome_loja: nome,
        raio_entrega_km: 8,
        taxa_por_km: 2.5,
        ativa: true
      });
    }

    if (tipo === "borracharia") {
      await supabase.from("borracheiros").insert({
        user_id: userId,
        nome: nome,
        ativo: true
      });
    }

    if (tipo === "passagens") {
      await supabase.from("config_passagens").insert({
        app_id: app.id,
        nome_empresa: nome,
        total_poltronas: 20,
        valor_base: 0,
        ativa: true
      });

      // ⚠️ se sua tabela viagens der erro, comenta isso
      await supabase.from("viagens").insert({
        rota: "Cidade A → Cidade B",
        hora: "08:00",
        dias: "Seg,Qua,Sex",
        app_id: app.id,
        ativo: true
      });
    }

    alert("Conta criada! Válida por 30 dias.");

    window.location.href = "https://www.ffsolucoes.com.br/auth/login.html";

  } catch (err) {
    console.error(err);
    alert(err.message || "Erro ao criar conta");
  }

  botao.disabled = false;
  botao.textContent = "Criar Conta";
};
</script>

<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  font-family:Arial;
  color:#fff;
}

.box{
  width:100%;
  max-width:500px;
  background:#0f172a;
  padding:30px;
  border-radius:20px;
}

input,select,button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:none;
}

input,select{
  background:#111827;
  color:#fff;
}

button{
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>✅ Cadastro de Conta</h2>

  <input id="nomeNegocio" placeholder="Nome do negócio">

  <select id="tipoNegocio">
    <option value="bar">Bar</option>
    <option value="mercado">Mercado</option>
    <option value="locadora">Locadora</option>
    <option value="hotel">Hotel</option>
    <option value="loja-roupas">Loja de Roupas</option>
    <option value="celular">Loja de Celular</option>
    <option value="gas">Água e Gás</option>
    <option value="borracharia">Borracharia</option>
    <option value="passagens">🚌 Passagens</option>
  </select>

  <input id="usuarioAdmin" type="email" placeholder="E-mail">
  <input id="senhaAdmin" type="password" placeholder="Senha">

  <button id="btnCriar" onclick="criarConta()">Criar Conta</button>
</div>

</body>
</html>
