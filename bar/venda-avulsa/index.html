<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Venda Avulsa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module" src="../js/auth.js"></script>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#020617;color:#fff}
.topo{background:#0f172a;padding:16px;font-size:20px;font-weight:bold}
.container{max-width:900px;margin:auto;padding:20px}

input,select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-bottom:12px
}

.produto,.item{
  background:#0f172a;
  border-radius:14px;
  padding:14px;
  margin-bottom:12px
}

.produto{
  display:flex;
  justify-content:space-between;
  align-items:center
}

.controls{
  display:flex;
  gap:8px;
  margin-top:6px
}

button{
  padding:6px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold
}

.add{background:#22c55e;color:#000}
.pay{
  width:100%;
  padding:16px;
  border-radius:12px;
  background:#2563eb;
  color:#fff;
  font-size:16px;
  font-weight:bold;
  margin-top:16px
}

.total{
  font-size:18px;
  font-weight:bold;
  margin-top:10px
}

.troco{
  color:#22c55e;
  font-weight:bold;
  margin-top:6px
}
</style>
</head>

<body>

<div class="topo">âž• Venda Avulsa</div>

<div class="container">

  <input placeholder="ðŸ” Buscar produto..." oninput="filtrar(this.value)">

  <h3>Produtos</h3>
  <div id="listaProdutos"></div>

  <h3>Venda</h3>
  <div id="carrinho"></div>

  <p class="total">Total: R$ <span id="total">0.00</span></p>

  <select id="forma" onchange="ajustarForma()">
    <option value="dinheiro">Dinheiro</option>
    <option value="pix">Pix</option>
    <option value="debito">DÃ©bito</option>
    <option value="credito">CrÃ©dito</option>
  </select>

  <input
    id="valorRecebido"
    type="number"
    step="0.01"
    placeholder="Valor recebido"
    oninput="calcularTroco()"
  >

  <div id="troco" class="troco"></div>

  <button class="pay" onclick="finalizar()">ðŸ’° Finalizar venda</button>

</div>

<script type="module">
import { supabase } from "../js/supabase.js";

let app_id = null;
let produtos = [];
let carrinho = [];

/* =========================
   INICIAR
========================= */
async function iniciar(){

  const { data: { session } } = await supabase.auth.getSession();

  if(!session){
    location.href="/auth/login.html";
    return;
  }

  const { data: usuario } = await supabase
    .from("usuarios")
    .select("app_id")
    .eq("id", session.user.id)
    .single();

  app_id = usuario.app_id;

  ajustarForma();
  carregarProdutos();
}

/* =========================
   PRODUTOS
========================= */
async function carregarProdutos(){

  const { data } = await supabase
    .from("produtos")
    .select("id,nome,preco")
    .eq("app_id", app_id)
    .eq("ativo", true)
    .order("nome");

  produtos = data || [];
  renderProdutos(produtos);
}

function renderProdutos(lista){
  const div = document.getElementById("listaProdutos");
  div.innerHTML = "";

  lista.forEach(p=>{
    div.innerHTML += `
      <div class="produto">
        <span>${p.nome} - R$ ${Number(p.preco).toFixed(2)}</span>
        <button class="add" onclick='addProduto(${JSON.stringify(p)})'>âž•</button>
      </div>
    `;
  });
}

window.filtrar = function(txt){
  txt = txt.toLowerCase();
  renderProdutos(produtos.filter(p=>p.nome.toLowerCase().includes(txt)));
};

/* =========================
   CARRINHO
========================= */
window.addProduto = function(p){
  const item = carrinho.find(i=>i.id === p.id);
  if(item){
    item.qtd++;
  } else {
    carrinho.push({ ...p, qtd:1 });
  }
  renderCarrinho();
};

window.alterar = function(id, delta){
  const item = carrinho.find(i=>i.id === id);
  if(!item) return;

  item.qtd += delta;
  if(item.qtd <= 0){
    carrinho = carrinho.filter(i=>i.id !== id);
  }
  renderCarrinho();
};

function renderCarrinho(){
  const div = document.getElementById("carrinho");
  div.innerHTML = "";
  let total = 0;

  carrinho.forEach(i=>{
    total += i.preco * i.qtd;
    div.innerHTML += `
      <div class="item">
        <strong>${i.nome}</strong>
        <div class="controls">
          <button onclick="alterar('${i.id}',-1)">âž–</button>
          <span>${i.qtd}</span>
          <button onclick="alterar('${i.id}',1)">âž•</button>
        </div>
      </div>
    `;
  });

  document.getElementById("total").innerText = total.toFixed(2);
  calcularTroco();
}

/* =========================
   PAGAMENTO
========================= */
window.ajustarForma = function(){
  const forma = document.getElementById("forma").value;
  const recebido = document.getElementById("valorRecebido");
  document.getElementById("troco").innerText = "";

  if(forma !== "dinheiro"){
    recebido.value = "";
    recebido.disabled = true;
  } else {
    recebido.disabled = false;
  }
};

window.calcularTroco = function(){
  const forma = document.getElementById("forma").value;
  const recebido = Number(document.getElementById("valorRecebido").value || 0);
  const total = carrinho.reduce((s,i)=>s + i.preco*i.qtd,0);

  if(forma !== "dinheiro"){
    document.getElementById("troco").innerText = "";
    return;
  }

  const troco = recebido - total;
  document.getElementById("troco").innerText =
    troco >= 0 ? `Troco: R$ ${troco.toFixed(2)}` : "";
};

/* =========================
   FINALIZAR (FLUXO PADRÃƒO)
========================= */
window.finalizar = async function(){

  if(carrinho.length === 0){
    alert("Nenhum produto adicionado");
    return;
  }

  const forma = document.getElementById("forma").value;
  const total = carrinho.reduce((s,i)=>s + i.preco*i.qtd,0);
  const recebido = Number(document.getElementById("valorRecebido").value || 0);

  if(forma === "dinheiro" && recebido < total){
    alert("Valor insuficiente");
    return;
  }

  /* 1ï¸âƒ£ CRIA PEDIDO */
  const { data: pedido, error } = await supabase
    .from("pedidos")
    .insert({
      app_id,
      mesa_id: null,
      status: "finalizado",
      forma_pagamento: forma,
      recebido_em: new Date().toISOString()
    })
    .select()
    .single();

  if(error){
    alert("Erro ao criar pedido");
    console.error(error);
    return;
  }

  /* 2ï¸âƒ£ INSERE ITENS */
  for(const item of carrinho){
    await supabase.from("pedido_itens").insert({
      pedido_id: pedido.id,
      produto_id: item.id,
      nome_produto: item.nome,
      quantidade: item.qtd,
      preco: item.preco
    });
  }

  alert("âœ… Venda registrada");
  location.href="caixa.html";
};

iniciar();
</script>

</body>
</html>
