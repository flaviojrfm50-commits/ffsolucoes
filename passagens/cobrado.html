<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobrador | Scanner de Passagem</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#020617 0%,#0f172a 100%);
  color:#fff;
}
.topo{
  position:sticky;
  top:0;
  z-index:10;
  background:#020617;
  padding:14px 16px;
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}
.topo h1{
  margin:0;
  font-size:20px;
}
.topo-acoes{
  display:flex;
  align-items:center;
  gap:10px;
}
.container{
  max-width:1000px;
  margin:auto;
  padding:16px;
}
.card{
  background:linear-gradient(180deg,#172033,#0f172a);
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 10px 24px rgba(0,0,0,.18);
}
.subtitulo{
  margin:0 0 12px 0;
  font-size:20px;
}
input,button,select{
  width:100%;
  padding:12px 14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  font-size:15px;
}
input,select{
  background:#fff;
  color:#111827;
}
button{
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.btn-azul{background:#2563eb}
.btn-verde{background:#16a34a}
.btn-vermelho{background:#dc2626}
.btn-cinza{background:#475569}
.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
#reader{
  width:100%;
  overflow:hidden;
  border-radius:14px;
  background:#000;
  min-height:260px;
}
.msg{
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  font-size:14px;
}
.msg.ok{background:#14532d}
.msg.erro{background:#7f1d1d}
.msg.info{background:#1e3a8a}
.resultado{
  display:grid;
  grid-template-columns:1.3fr .7fr;
  gap:16px;
}
.info-box{
  background:#0b1220;
  border-radius:14px;
  padding:14px;
}
.info-box div{
  margin-bottom:8px;
  line-height:1.5;
}
.fotos{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}
.foto-card{
  background:#0b1220;
  border-radius:14px;
  padding:12px;
}
.foto-card h4{
  margin:0 0 8px 0;
  font-size:15px;
}
.foto-card img{
  width:100%;
  border-radius:12px;
  background:#fff;
}
.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
}
.badge.pago{background:#1d4ed8}
.badge.pendente{background:#d97706}
.badge.cancelado{background:#b91c1c}
.badge.outro{background:#475569}
.lista-registros{
  display:grid;
  gap:14px;
}
.linha-acoes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}
small{opacity:.8}
.card .card-body{
  display:none;
}

.card.ativo .card-body{
  display:block;
}

.card.recolhido{
  cursor:pointer;
}

.card.ativo{
  position:fixed;
  inset:0;
  z-index:9999;
  overflow:auto;
  border-radius:0;
  background:linear-gradient(180deg,#172033,#0f172a);
}

@media(max-width:800px){
  .grid2,.resultado,.linha-acoes{
    grid-template-columns:1fr;
  }
  .topo{
    align-items:flex-start;
    flex-direction:column;
  }
  .topo-acoes{
    width:100%;
    justify-content:space-between;
  }
}
</style>
</head>
<body>

<div class="topo">
  <h1>🚌 Cobrador | Scanner de Passagem</h1>

  <div class="topo-acoes">
    <div id="appInfo"><small>Carregando...</small></div>
    <button class="btn-vermelho" style="width:auto;margin:0;padding:10px 14px;" onclick="logout()">Sair</button>
  </div>
</div>

<div class="container">

  <div class="card">
    <h2 class="subtitulo">Dados do passageiro</h2>
    <div id="resultadoBusca">
      <div class="msg info">Aguardando leitura do QR ou digitação do código.</div>
    </div>
  </div>

<div class="card card-clicavel recolhido" id="cardVendaManual">
  <h2 class="subtitulo" onclick="abrirCard('cardVendaManual')">💰 Venda manual no embarque</h2>

  <div class="card-body">
    <div class="grid2">
      <div>
        <label>Viagem</label>
        <select id="viagemVendaManual" onchange="aoTrocarViagemVendaManual(); salvarRascunhoVendaManual()">
          <option value="">Selecione a viagem</option>
        </select>

        <label>Data da viagem</label>
        <input type="date" id="dataVendaManual" onchange="salvarRascunhoVendaManual()">

        <label>Origem</label>
        <select id="origemVendaManual" onchange="aoTrocarTrechoVendaManual(); salvarRascunhoVendaManual()">
          <option value="">Selecione a origem</option>
        </select>

        <label>Destino</label>
        <select id="destinoVendaManual" onchange="aoTrocarTrechoVendaManual(); salvarRascunhoVendaManual()">
          <option value="">Selecione o destino</option>
        </select>

        <div id="resumoVendaManual" class="msg info">Selecione viagem, origem e destino.</div>

        <label>Poltrona</label>
        <select id="poltronaVendaManual" onchange="salvarRascunhoVendaManual()">
          <option value="">Selecione a poltrona</option>
        </select>
      </div>

      <div>
        <label>Nome do passageiro</label>
        <input type="text" id="nomeVendaManual" placeholder="Nome completo" oninput="salvarRascunhoVendaManual()">

        <label>Documento</label>
        <input type="text" id="cpfRgVendaManual" placeholder="CPF ou RG" oninput="salvarRascunhoVendaManual()">

        <label>WhatsApp</label>
        <input type="text" id="whatsappVendaManual" placeholder="WhatsApp" oninput="salvarRascunhoVendaManual()">

        <label>Forma de pagamento</label>
        <select id="formaPagamentoVendaManual" onchange="salvarRascunhoVendaManual()">
          <option value="">Selecione</option>
          <option value="dinheiro">Dinheiro</option>
          <option value="pix">PIX</option>
          <option value="cartao">Cartão</option>
        </select>

        <div class="linha-acoes">
          <button class="btn-azul" onclick="carregarPoltronasVendaManual()">Ver poltronas livres</button>
          <button class="btn-verde" onclick="venderPassagemManual()">Vender no embarque</button>
        </div>
      </div>
    </div>
  </div>
</div>


  <div class="card card-clicavel recolhido" id="cardQr">
  <h2 class="subtitulo" onclick="abrirCardQr()">📷 Ler QR da passagem</h2>

  <div class="card-body">

    <div class="grid2">
      <div>
        <div id="reader"></div>
        <div class="linha-acoes">
          
        </div>
        <button class="btn-azul" onclick="reabrirCamera()">🔄 Ler outro QR</button>
      </div>

      <div>
        <label>Data do embarque</label>
<input type="date" id="dataOperacaoCobrador">
        <label>Ou digite / cole o código do embarque</label>
        <input type="text" id="codigoManual" placeholder="Ex: FFP-123456-ABCDEF">

        <button class="btn-azul" onclick="buscarCodigoManual()">Buscar código</button>

        <label style="display:block;margin-top:14px;">Último QR lido</label>
        <input type="text" id="ultimoQrLido" readonly>

        <div id="msg"></div>
      </div>
    </div>
  </div>

  
</div>

<script>
const client = window.supabase.createClient(
  "https://pdajixsoowcyhnjwhgpc.supabase.co",
  "sb_publishable_LatlFlcxk6IchHe3RNmfwA_9Oq4EsZw"
);

let app_id = null;
let usuarioLogado = null;
let scanner = null;
let scannerRodando = false;
let ultimoCodigo = null;
let viagensCobrador = [];
let paradasVendaManual = [];
let precosTrechosVendaManual = [];
const RASCUNHO_VENDA_KEY = "ff_cobrador_venda_manual";

function salvarRascunhoVendaManual(){
  const payload = {
    viagemId: document.getElementById("viagemVendaManual")?.value || "",
    dataViagem: document.getElementById("dataVendaManual")?.value || "",
    origem: document.getElementById("origemVendaManual")?.value || "",
    destino: document.getElementById("destinoVendaManual")?.value || "",
    poltrona: document.getElementById("poltronaVendaManual")?.value || "",
    nome: document.getElementById("nomeVendaManual")?.value || "",
    cpfRg: document.getElementById("cpfRgVendaManual")?.value || "",
    whatsapp: document.getElementById("whatsappVendaManual")?.value || "",
    formaPagamento: document.getElementById("formaPagamentoVendaManual")?.value || ""
  };

  localStorage.setItem(RASCUNHO_VENDA_KEY, JSON.stringify(payload));
}

function limparRascunhoVendaManual(){
  localStorage.removeItem(RASCUNHO_VENDA_KEY);
}

async function restaurarRascunhoVendaManual(){
  try{
    const bruto = localStorage.getItem(RASCUNHO_VENDA_KEY);
    if(!bruto) return;

    const r = JSON.parse(bruto);
    if(!r) return;

    if(r.dataViagem){
      document.getElementById("dataVendaManual").value = r.dataViagem;
    }

    if(r.nome){
      document.getElementById("nomeVendaManual").value = r.nome;
    }

    if(r.cpfRg){
      document.getElementById("cpfRgVendaManual").value = r.cpfRg;
    }

    if(r.whatsapp){
      document.getElementById("whatsappVendaManual").value = r.whatsapp;
    }

    if(r.formaPagamento){
      document.getElementById("formaPagamentoVendaManual").value = r.formaPagamento;
    }

    if(r.viagemId){
      document.getElementById("viagemVendaManual").value = r.viagemId;
      await aoTrocarViagemVendaManual();
    }

    if(r.origem){
      document.getElementById("origemVendaManual").value = r.origem;
    }

    if(r.destino){
      document.getElementById("destinoVendaManual").value = r.destino;
      aoTrocarTrechoVendaManual();
    }

    if(r.viagemId && r.dataViagem){
      await carregarPoltronasVendaManual();
    }

    if(r.poltrona){
      document.getElementById("poltronaVendaManual").value = r.poltrona;
    }
  }catch(e){
    console.error("Erro ao restaurar rascunho da venda manual:", e);
  }
}

function setMsg(texto, tipo="info"){
  const box = document.getElementById("msg");
  if(!texto){
    box.innerHTML = "";
    return;
  }
  box.innerHTML = `<div class="msg ${tipo}">${texto}</div>`;
}

function escapeHtml(texto){
  return String(texto || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function nomeDiaSemana(dataISO){
  if(!dataISO) return "";
  const [ano, mes, dia] = dataISO.split("-").map(Number);
  const data = new Date(ano, mes - 1, dia);
  const dias = ["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];
  return dias[data.getDay()];
}

function normalizarDia(txt){
  return String(txt || "")
    .trim()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .slice(0,3);
}

function viagemRodaNaData(viagem, dataISO){
  if(!viagem || !dataISO) return false;

  const diaEscolhido = normalizarDia(nomeDiaSemana(dataISO));
  const diasViagem = String(viagem.dias || "")
    .split(",")
    .map(v => normalizarDia(v))
    .filter(Boolean);

  if(!diasViagem.length) return true;
  return diasViagem.includes(diaEscolhido);
}

function montarDataHoraLocal(dataISO, horaStr){
  if(!dataISO || !horaStr) return null;

  const [ano, mes, dia] = dataISO.split("-").map(Number);
  const partesHora = String(horaStr).trim().split(":");
  const hora = Number(partesHora[0] || 0);
  const minuto = Number(partesHora[1] || 0);

  return new Date(ano, mes - 1, dia, hora, minuto, 0, 0);
}

function viagemExpiradaParaData(viagem, dataISO){
  if(!viagem || !dataISO || !viagem.hora) return false;

  const agora = new Date();
  const saida = montarDataHoraLocal(dataISO, viagem.hora);

  if(!saida || isNaN(saida.getTime())) return false;
  return agora >= saida;
}

function badgeStatus(status){
  const s = String(status || "").toLowerCase().trim();
  if(["pago","pago_agencia","approved","embarcado","concluida","finalizada"].includes(s)){
    return `<span class="badge pago">${escapeHtml(status || "Pago")}</span>`;
  }
  if(["pendente","pendente_pagamento","pendente_agencia","aguardando_pagamento","pending"].includes(s)){
    return `<span class="badge pendente">${escapeHtml(status || "Pendente")}</span>`;
  }
  if(["cancelada","cancelado","cancelled"].includes(s)){
    return `<span class="badge cancelado">${escapeHtml(status || "Cancelado")}</span>`;
  }
  return `<span class="badge outro">${escapeHtml(status || "-")}</span>`;
}

async function carregarUsuarioLogado(){
  try{
    const { data: { session }, error: sessionError } = await client.auth.getSession();

    if(sessionError){
      document.getElementById("appInfo").innerHTML = "<small>Erro de sessão</small>";
      setMsg("Erro ao validar sessão: " + sessionError.message, "erro");
      return false;
    }

    if(!session){
      window.location.href = "/auth/login.html";
      return false;
    }

    const { data: usuario, error } = await client
      .from("usuarios")
      .select("id,nome,email,app_id,tipo")
      .eq("id", session.user.id)
      .single();

    if(error || !usuario){
      document.getElementById("appInfo").innerHTML = "<small>Usuário não encontrado</small>";
      setMsg("Não foi possível carregar o usuário logado.", "erro");
      return false;
    }

    const tipo = String(usuario.tipo || "").toLowerCase().trim();

    if(!["admin","cobrador"].includes(tipo)){
      document.getElementById("appInfo").innerHTML = "<small>Sem permissão</small>";
      setMsg("Esse usuário não tem permissão para acessar o cobrador.", "erro");
      return false;
    }

    usuarioLogado = usuario;
    app_id = String(usuario.app_id || "").trim();

    if(!app_id){
      document.getElementById("appInfo").innerHTML = "<small>app_id não encontrado</small>";
      setMsg("O usuário logado não está vinculado a nenhum negócio.", "erro");
      return false;
    }

    const { data: config } = await client
      .from("config_site")
      .select("nome_site")
      .eq("app_id", app_id)
      .maybeSingle();

    document.getElementById("appInfo").innerHTML =
      `<small>${escapeHtml(usuario.nome || "")} • ${escapeHtml(config?.nome_site || "FF Transporte")}</small>`;

    return true;
  }catch(e){
    console.error(e);
    document.getElementById("appInfo").innerHTML = "<small>Erro</small>";
    setMsg(e.message || "Erro ao carregar usuário logado.", "erro");
    return false;
  }
}

function extrairCodigoDoQr(texto){
  const bruto = String(texto || "").trim();
  if(!bruto) return "";

  try{
    const obj = JSON.parse(bruto);
    if(obj?.codigo_embarque) return String(obj.codigo_embarque).trim();
    if(obj?.codigo) return String(obj.codigo).trim();
  }catch(e){}

  return bruto;
}

async function iniciarScanner(){
  try{
    if(!app_id){
      const ok = await carregarUsuarioLogado();
      if(!ok) return;
    }

    document.getElementById("reader").style.display = "block";

    if(scannerRodando) return;

    setMsg("Abrindo câmera...", "info");

    scanner = new Html5Qrcode("reader");

    await scanner.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: { width: 250, height: 250 }
      },
      async (decodedText) => {
        const codigo = extrairCodigoDoQr(decodedText);
        if(!codigo) return;

        if(ultimoCodigo === codigo) return;
        ultimoCodigo = codigo;

        document.getElementById("ultimoQrLido").value = codigo;

        await pararScanner();
        document.getElementById("reader").style.display = "none";
        document.getElementById("cardQr").classList.remove("ativo");
document.getElementById("cardQr").classList.add("recolhido");

        setMsg("✅ QR lido com sucesso.", "ok");

        if(navigator.vibrate){
          navigator.vibrate(200);
        }

        await buscarPassageiroPorCodigo(codigo);
      },
      () => {}
    );

    scannerRodando = true;
    setMsg("Câmera aberta. Aponte para o QR da passagem.", "ok");
  }catch(e){
    console.error(e);
    setMsg("Não foi possível abrir a câmera.", "erro");
  }
}

async function pararScanner(){
  try{
    if(scanner && scannerRodando){
      await scanner.stop();
      await scanner.clear();
      scannerRodando = false;
      setMsg("Câmera parada.", "info");
    }
  }catch(e){
    console.error(e);
  }
}

window.reabrirCamera = async function(){
  document.getElementById("reader").style.display = "block";
  ultimoCodigo = null;
  await iniciarScanner();
};

async function buscarCodigoManual(){
  const codigo = document.getElementById("codigoManual").value.trim();
  if(!codigo){
    setMsg("Digite um código.", "erro");
    return;
  }

  document.getElementById("ultimoQrLido").value = codigo;
  await buscarPassageiroPorCodigo(codigo);
}

async function marcarEmbarcado(idReserva){
  abrirModalConfirmacao(
    "Confirmar embarque",
    "Deseja realmente marcar este passageiro como <b>EMBARCADO</b>?",
    async () => {
      try{
        if(!app_id){
          const ok = await carregarUsuarioLogado();
          if(!ok) return;
        }

        const { error } = await client
          .from("reservas_passagens")
          .update({ status: "embarcado" })
          .eq("id", idReserva)
          .eq("app_id", app_id);

        if(error){
          setMsg("Erro ao marcar embarque: " + error.message, "erro");
          return;
        }

        setMsg("Passageiro marcado como embarcado.", "ok");

        if(ultimoCodigo){
          await buscarPassageiroPorCodigo(ultimoCodigo);
        }
      }catch(e){
        setMsg(e.message || "Erro ao marcar embarque.", "erro");
      }
    },
    "Confirmar embarque",
    "btn-verde"
  );
}

window.marcarEmbarcado = marcarEmbarcado;

function gerarCodigoReservaManual(){
  const parte1 = Date.now().toString().slice(-6);
  const parte2 = Math.random().toString(36).slice(2, 8).toUpperCase();
  return `FFP-${parte1}-${parte2}`;
}

function trechosConflitam(origemA, destinoA, origemB, destinoB){
  origemA = Number(origemA || 0);
  destinoA = Number(destinoA || 0);
  origemB = Number(origemB || 0);
  destinoB = Number(destinoB || 0);

  if(!origemA || !destinoA || !origemB || !destinoB) return true;
  return origemA < destinoB && destinoA > origemB;
}

function getTipoPoltronaDoVeiculo(veiculo, numeroPoltrona){
  const config = Array.isArray(veiculo?.poltronas_config) ? veiculo.poltronas_config : [];
  const item = config.find(p => Number(p.numero) === Number(numeroPoltrona));
  return item?.tipo || veiculo?.tipo_poltrona || "padrao";
}

async function carregarViagensCobrador(){
  if(!app_id) return;

  const select = document.getElementById("viagemVendaManual");
  select.innerHTML = `<option value="">Selecione a viagem</option>`;

  const { data, error } = await client
    .from("viagens_passagens")
    .select("id, rota, hora, dias")
    .eq("app_id", app_id)
    .order("id", { ascending:false });

  if(error){
    console.error(error);
    return;
  }

  viagensCobrador = data || [];

  for(const v of viagensCobrador){
    select.innerHTML += `<option value="${v.id}">${escapeHtml(v.rota || "")} - ${escapeHtml(v.hora || "")}</option>`;
  }
}

async function aoTrocarViagemVendaManual(){
  const viagemId = document.getElementById("viagemVendaManual").value;
  paradasVendaManual = [];
  precosTrechosVendaManual = [];

  document.getElementById("origemVendaManual").innerHTML = `<option value="">Selecione a origem</option>`;
  document.getElementById("destinoVendaManual").innerHTML = `<option value="">Selecione o destino</option>`;
  document.getElementById("poltronaVendaManual").innerHTML = `<option value="">Selecione a poltrona</option>`;
  document.getElementById("resumoVendaManual").innerHTML = "Selecione viagem, origem e destino.";

  if(!viagemId) return;

  const { data: paradas, error: erroParadas } = await client
    .from("viagens_paradas")
    .select("*")
    .eq("app_id", app_id)
    .eq("viagem_id", viagemId)
    .order("ordem", { ascending:true });

  if(erroParadas){
    console.error(erroParadas);
    return;
  }

  paradasVendaManual = paradas || [];

  const { data: precos, error: erroPrecos } = await client
    .from("viagens_precos_trechos")
    .select("*")
    .eq("app_id", app_id)
    .eq("viagem_id", viagemId)
    .order("origem_ordem", { ascending:true });

  if(erroPrecos){
    console.error(erroPrecos);
    return;
  }

  precosTrechosVendaManual = precos || [];

  const origem = document.getElementById("origemVendaManual");
  const destino = document.getElementById("destinoVendaManual");

  for(const p of paradasVendaManual){
    origem.innerHTML += `<option value="${p.ordem}">${p.ordem} - ${escapeHtml(p.cidade)}</option>`;
    destino.innerHTML += `<option value="${p.ordem}">${p.ordem} - ${escapeHtml(p.cidade)}</option>`;
  }
}

window.aoTrocarViagemVendaManual = aoTrocarViagemVendaManual;

function getTextoTrechoVendaManual(origem, destino){
  const o = paradasVendaManual.find(p => Number(p.ordem) === Number(origem));
  const d = paradasVendaManual.find(p => Number(p.ordem) === Number(destino));
  if(!o || !d) return "Viagem inteira";
  return `${o.cidade} → ${d.cidade}`;
}

function getPrecoTrechoVendaManual(origem, destino){
  const item = precosTrechosVendaManual.find(p =>
    Number(p.origem_ordem) === Number(origem) &&
    Number(p.destino_ordem) === Number(destino)
  );
  return item ? Number(item.valor || 0) : 0;
}

function aoTrocarTrechoVendaManual(){
  const origem = document.getElementById("origemVendaManual").value;
  const destino = document.getElementById("destinoVendaManual").value;
  const box = document.getElementById("resumoVendaManual");

  if(!origem || !destino){
    box.innerHTML = "Selecione origem e destino.";
    return;

  if(Number(origem) >= Number(destino)){

async function carregarPoltronasVendaManual(){
  const viagemId = document.getElementById("viagemVendaManual").value;
  const dataViagem = document.getElementById("dataVendaManual").value;
  const origem = document.getElementById("origemVendaManual").value;
  const destino = document.getElementById("destinoVendaManual").value;
  const selectPoltrona = document.getElementById("poltronaVendaManual");

  selectPoltrona.innerHTML = `<option value="">Selecione a poltrona</option>`;

  if(!viagemId){
    setMsg("Selecione a viagem.", "erro");
    return;
  }

  if(!dataViagem){
    setMsg("Selecione a data da viagem.", "erro");
    return;
  }

  if(paradasVendaManual.length){
    if(!origem || !destino){
      setMsg("Selecione origem e destino.", "erro");
      return;
    }

    if(Number(origem) >= Number(destino)){
      setMsg("O destino precisa ser depois da origem.", "erro");
      return;
    }
  }

  
    const { data: viagem, error: erroViagem } = await client
    .from("viagens_passagens")
    .select("veiculo_id, rota, hora, dias")
    .eq("id", viagemId)
    .maybeSingle();

  if(erroViagem || !viagem){
    setMsg("Viagem não encontrada.", "erro");
    return;
  }

  if(!viagem?.veiculo_id){
    setMsg("Veículo da viagem não encontrado.", "erro");
    return;
  }

  if(!viagemRodaNaData(viagem, dataViagem)){
    setMsg(`Essa viagem não roda nessa data. Dias disponíveis: ${viagem?.dias || "-"}.`, "erro");
    return;
  }

  if(viagemExpiradaParaData(viagem, dataViagem)){
    setMsg(`Essa viagem de hoje às ${viagem?.hora || ""} já saiu e não aceita mais venda.`, "erro");
    return;
  }

  const { data: veiculo, error: erroVeiculo } = await client
  .from("veiculos_passagens")
  .select("total_poltronas, poltronas_config, tipo_poltrona")
  .eq("id", viagem.veiculo_id)
  .maybeSingle();

  if(erroVeiculo || !veiculo){
    setMsg("Veículo não encontrado.", "erro");
    return;
  }

  const totalPoltronas = Number(veiculo?.total_poltronas || 0);

  if(!totalPoltronas){
    setMsg("Total de poltronas não encontrado.", "erro");
    return;
  }

  const { data: reservas } = await client
    .from("reservas_passagens")
    .select("*")
    .eq("app_id", app_id)
    .eq("viagem_id", viagemId)
    .eq("data_viagem", dataViagem);

  for(let i=1;i<=totalPoltronas;i++){
    const ocupado = (reservas || []).some(r => {
      const status = String(r.status || "").toLowerCase().trim();
      if(["cancelada","cancelado","cancelled"].includes(status)) return false;

      if(!origem || !destino) return Number(r.poltrona) === i;

      const origemR = Number(r.origem_ordem || 0);
      const destinoR = Number(r.destino_ordem || 0);

      if(!origemR || !destinoR){
        return Number(r.poltrona) === i;
      }

      return Number(r.poltrona) === i &&
        trechosConflitam(origem, destino, origemR, destinoR);
    });

    if(!ocupado){
  const tipo = getTipoPoltronaDoVeiculo(veiculo, i);
  const tipoLabel =
    tipo === "leito" ? "Leito" :
    tipo === "semi_leito" ? "Semi-Leito" :
    "Padrão";

  selectPoltrona.innerHTML += `<option value="${i}">Poltrona ${i} • ${tipoLabel}</option>`;
}
  }

  setMsg("Poltronas livres carregadas.", "ok");
  salvarRascunhoVendaManual();
}

let callbackConfirmacao = null;

function abrirModalConfirmacao(titulo, texto, onConfirm, textoBotao = "Confirmar", classeBotao = "btn-verde"){
  const modal = document.getElementById("modalConfirmacao");
  const tituloEl = document.getElementById("modalConfirmacaoTitulo");
  const textoEl = document.getElementById("modalConfirmacaoTexto");
  const btn = document.getElementById("btnConfirmarModalAcao");

  tituloEl.textContent = titulo || "Confirmar ação";
  textoEl.innerHTML = texto || "Tem certeza?";
  btn.textContent = textoBotao || "Confirmar";
  btn.className = classeBotao || "btn-verde";

  callbackConfirmacao = onConfirm;
  modal.style.display = "flex";

  if(navigator.vibrate){
    navigator.vibrate(80);
  }
}

function fecharModalConfirmacao(){
  const modal = document.getElementById("modalConfirmacao");
  modal.style.display = "none";
  callbackConfirmacao = null;
}

document.addEventListener("click", function(e){
  if(e.target && e.target.id === "btnConfirmarModalAcao"){
    const acao = callbackConfirmacao;
    fecharModalConfirmacao();
    if(typeof acao === "function"){
      acao();
    }
  }

  if(e.target && e.target.id === "modalConfirmacao"){
    fecharModalConfirmacao();
  }
});

  });

  if(!jaAberto){
    card.classList.add("ativo");
    card.classList.remove("recolhido");
  }
}

async function abrirCardQr(){
  abrirCard("cardQr");
  await iniciarScanner();
}

(async function init(){
  const ok = await carregarUsuarioLogado();
  if(ok){
    const hoje = new Date().toISOString().slice(0,10);
    document.getElementById("dataOperacaoCobrador").value = hoje;

    await carregarViagensCobrador();
    await restaurarRascunhoVendaManual();

    if(!document.getElementById("dataVendaManual").value){
      document.getElementById("dataVendaManual").value = hoje;
      salvarRascunhoVendaManual();
    }
  }
})();
