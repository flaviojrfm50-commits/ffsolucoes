<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FF Transporte</title>

<style>
body {
    background: #0f172a;
    color: #fff;
    font-family: Arial;
}

.container {
    display: flex;
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    width: 50%;
}

select, input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

.poltronas {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 10px;
}

.poltrona {
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
}

.livre { background: #22c55e; }
.ocupado { background: #ef4444; }
.selecionado { background: #3b82f6; }
</style>
</head>

<body>

<h2 style="padding: 10px;">FF TRANSPORTE</h2>

<div class="container">

<!-- LADO ESQUERDO -->
<div class="card">

<h3>Tipo de Viagem</h3>
<select>
<option>Somente Ida</option>
</select>

<h3>Viagens</h3>
<div id="listaViagens"></div>

</div>

<!-- LADO DIREITO -->
<div class="card">

<h3>Poltronas</h3>
<div class="poltronas" id="poltronas"></div>

<select>
<option>Forma de pagamento</option>
<option>PIX</option>
<option>Dinheiro</option>
</select>

<input type="text" placeholder="Seu nome">

<button onclick="reservar()">Pagar e Reservar</button>

</div>

</div>

<script>
// 🔥 EXEMPLO DE DADOS (vem do ADMIN)
const viagens = [
    {
        id: 1,
        rota: "SRN → Teresina",
        hora: "08:00",
        dias: ["Seg", "Qua", "Sex"]
    },
    {
        id: 2,
        rota: "SRN → Petrolina",
        hora: "14:00",
        dias: ["Ter", "Qui", "Sab"]
    }
];

// 🔥 CARREGAR VIAGENS
const lista = document.getElementById("listaViagens");

viagens.forEach(v => {
    const div = document.createElement("div");

    div.innerHTML = `
        <p><b>${v.rota}</b> - ${v.hora}</p>
        <small>Dias: ${v.dias.join(", ")}</small>
        <hr>
    `;

    div.onclick = () => selecionarViagem(v.id);

    lista.appendChild(div);
});

// 🔥 GERAR POLTRONAS
const poltronasDiv = document.getElementById("poltronas");

let selecionada = null;

for (let i = 1; i <= 20; i++) {
    const btn = document.createElement("div");

    btn.innerText = i;
    btn.className = "poltrona livre";

    btn.onclick = () => {
        document.querySelectorAll(".poltrona").forEach(p => p.classList.remove("selecionado"));
        btn.classList.add("selecionado");
        selecionada = i;
    };

    poltronasDiv.appendChild(btn);
}

// 🔥 SELECIONAR VIAGEM
function selecionarViagem(id) {
    console.log("Viagem selecionada:", id);
}

// 🔥 RESERVAR
function reservar() {
    if (!selecionada) {
        alert("Selecione uma poltrona");
        return;
    }

    alert("Reserva feita! Poltrona: " + selecionada);
}
</script>

</body>
</html>
