
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configurar Passagens</title>

  <style>
    :root{
      --bg:#020617;
      --card:#0f172a;
      --border:#1e293b;
      --text:#ffffff;
      --muted:#94a3b8;
      --primary:#22c55e;
      --danger:#ef4444;
      --input:#0b1220;
      --warning:#f59e0b;
      --info:#93c5fd;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .topo{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px 20px;
      background:#0f172a;
      border-bottom:1px solid var(--border);
    }

    .topo h2{
      margin:0;
      font-size:20px;
    }

    .btn-topo{
      background:var(--danger);
      color:#fff;
      border:none;
      padding:10px 16px;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
    }

    .container{
      max-width:760px;
      margin:30px auto;
      padding:20px;
    }

    .box{
      background:var(--card);
      border:1px solid var(--border);
      padding:20px;
      border-radius:16px;
      margin-bottom:18px;
    }

    h3{
      margin:0 0 12px 0;
      font-size:18px;
    }

    label{
      display:block;
      margin-top:10px;
      font-size:13px;
      color:var(--muted);
    }

    input, select, textarea, button{
      width:100%;
      padding:12px;
      margin-top:8px;
      border-radius:10px;
      border:none;
      outline:none;
      font-size:14px;
    }

    input, select, textarea{
      background:var(--input);
      color:var(--text);
      border:1px solid var(--border);
    }

    textarea{
      resize:vertical;
      min-height:88px;
    }

    button{
      background:var(--primary);
      color:#04120a;
      font-weight:bold;
      cursor:pointer;
    }

    .btn-danger{
      background:var(--danger);
      color:#fff;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    @media(max-width:640px){
      .row{grid-template-columns:1fr}
    }

    img{
      width:100%;
      max-height:220px;
      object-fit:cover;
      margin-top:10px;
      border-radius:12px;
      border:1px solid var(--border);
      background:var(--input);
    }

    .hidden{
      display:none;
    }

    small{
      display:block;
      margin-top:6px;
      color:var(--muted);
      line-height:1.4;
    }

    .status{
      margin-top:12px;
      font-size:13px;
      line-height:1.5;
      padding:10px 12px;
      border-radius:10px;
      display:none;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .status.show{display:block}
    .status.info{
      background:rgba(59,130,246,.12);
      color:var(--info);
      border:1px solid rgba(59,130,246,.25);
    }
    .status.ok{
      background:rgba(34,197,94,.12);
      color:#86efac;
      border:1px solid rgba(34,197,94,.25);
    }
    .status.erro{
      background:rgba(239,68,68,.12);
      color:#fca5a5;
      border:1px solid rgba(239,68,68,.25);
    }
    .status.aviso{
      background:rgba(245,158,11,.12);
      color:#fcd34d;
      border:1px solid rgba(245,158,11,.25);
    }

    .link-box{
      margin-top:10px;
      background:#111827;
      border:1px solid var(--border);
      padding:10px;
      border-radius:10px;
      font-size:12px;
      color:#cbd5e1;
      word-break:break-all;
    }
  </style>
</head>

<body>
  <div class="topo">
    <h2>🚌 Configurar Passagens</h2>
    <button class="btn-topo" onclick="logout()">Sair</button>
  </div>

  <div class="container">

    <div class="box">
      <h3>Informações da Empresa</h3>

      <input id="nome" placeholder="Nome da empresa de passagens" />

      <label>Logo</label>
      <input type="file" id="inputLogo" accept="image/*" />
      <img id="previewLogo" alt="Preview logo" />
      <button type="button" class="btn-danger" id="btnRemoverLogo">❌ Remover Logo</button>

      <label>Banner</label>
      <input type="file" id="inputBanner" accept="image/*" />
      <img id="previewBanner" alt="Preview banner" />
      <button type="button" class="btn-danger" id="btnRemoverBanner">❌ Remover Banner</button>

      <label>Texto do banner</label>
      <textarea id="bannerDescricao" placeholder="Ex: Compre sua passagem com rapidez e segurança"></textarea>
    </div>

    <div class="box">
      <h3>Contato e Embarque</h3>

      <input id="telefone" placeholder="Telefone / WhatsApp" />

      <div class="row">
        <input id="cidade" placeholder="Cidade" />
        <input id="estado" placeholder="Estado" />
      </div>

      <input id="rua" placeholder="Rua / local de embarque" />
      <input id="numero" placeholder="Número / referência" />

      <label>Mensagem de apoio</label>
      <textarea id="mensagemFechado" placeholder="Ex: Após o pagamento entraremos em contato com os detalhes do embarque."></textarea>
    </div>

    <div class="box">
      <h3>Pagamento</h3>

      <label>Modo de venda</label>
      <select id="modoVenda">
        <option value="whatsapp">Venda via WhatsApp</option>
        <option value="sistema">Venda pelo Sistema (Mercado Pago)</option>
      </select>

      <label>WhatsApp (somente números)</label>
      <input id="whatsapp" placeholder="Ex: 88999999999" />

      <label>Chave PIX</label>
      <input id="pixChave" placeholder="Sua chave PIX" />
      <small>Usada quando o cliente escolher PIX.</small>

      <div id="boxMp" class="hidden">
        <label>Token do Mercado Pago (Access Token)</label>
        <input id="mpToken" placeholder="Cole aqui o Access Token do Mercado Pago" />
        <small>Esse token é salvo por app_id, igual no teu fluxo atual.</small>

        <button type="button" class="btn-danger" id="btnRemoverToken">
          ❌ Remover Token Mercado Pago
        </button>
      </div>
    </div>

    <div class="box">
      <h3>Visual</h3>

      <label>Tema</label>
      <select id="tema">
        <option value="padrao">Padrão</option>
        <option value="natal">Natal</option>
        <option value="anonovo">Ano Novo</option>
        <option value="capivara">Capivara</option>
      </select>

      <label>Link público</label>
      <div class="link-box" id="linkPublico">Carregando link...</div>
      <button type="button" onclick="copiarLink()">🔗 Copiar link público</button>
    </div>

    <button id="btnSalvar">Salvar Configurações</button>
    <div class="status" id="status"></div>

  </div>

  <script type="module">
    import { supabase } from "../js/supabase.js";

    const statusEl = document.getElementById("status");

    const nome = document.getElementById("nome");
    const bannerDescricao = document.getElementById("bannerDescricao");
    const rua = document.getElementById("rua");
    const numero = document.getElementById("numero");
    const cidade = document.getElementById("cidade");
    const estado = document.getElementById("estado");
    const telefone = document.getElementById("telefone");

    const tema = document.getElementById("tema");
    const modoVenda = document.getElementById("modoVenda");
    const whatsapp = document.getElementById("whatsapp");
    const pixChave = document.getElementById("pixChave");
    const mensagemFechado = document.getElementById("mensagemFechado");

    const boxMp = document.getElementById("boxMp");
    const mpToken = document.getElementById("mpToken");

    const inputLogo = document.getElementById("inputLogo");
    const inputBanner = document.getElementById("inputBanner");
    const previewLogo = document.getElementById("previewLogo");
    const previewBanner = document.getElementById("previewBanner");

    const btnSalvar = document.getElementById("btnSalvar");
    const btnRemoverLogo = document.getElementById("btnRemoverLogo");
    const btnRemoverBanner = document.getElementById("btnRemoverBanner");
    const btnRemoverToken = document.getElementById("btnRemoverToken");

    let APP_ID = null;

    function setStatus(msg, tipo = "info"){
      statusEl.className = `status show ${tipo}`;
      statusEl.textContent = msg || "";
    }

    function limparStatus(){
      statusEl.className = "status";
      statusEl.textContent = "";
    }

    function extrairMensagemErro(error){
      if(!error) return "Erro desconhecido.";
      return (
        error.message ||
        error.details ||
        error.hint ||
        JSON.stringify(error)
      );
    }

    function alternarCamposPagamento(){
      const mostrarMp = modoVenda.value === "sistema";
      boxMp.classList.toggle("hidden", !mostrarMp);

      if(mostrarMp){
        setStatus("Modo sistema ativo. Informe e salve o token do Mercado Pago para PIX e cartão funcionarem.", "aviso");
      }else{
        limparStatus();
      }
    }

    modoVenda.addEventListener("change", alternarCamposPagamento);

    async function verificarSessao(){
      const { data:{ session } } = await supabase.auth.getSession();

      if(!session){
        window.location.href = "/auth/login.html";
        return null;
      }

      return session.user.id;
    }

    async function carregarAppId(){
      const userId = await verificarSessao();
      if(!userId) return;

      const { data, error } = await supabase
        .from("usuarios")
        .select("app_id")
        .eq("id", userId)
        .single();

      if(error || !data?.app_id){
        console.error("Erro ao carregar app_id:", error);
        alert("Usuário sem app_id vinculado.");
        return;
      }

      APP_ID = data.app_id;
    }

    async function uploadImagem(file, bucket){
      if(!APP_ID) return null;

      const nomeArquivo = `${APP_ID}_${Date.now()}_${file.name}`;

      const { error } = await supabase.storage
        .from(bucket)
        .upload(nomeArquivo, file, { cacheControl:"3600", upsert:true });

      if(error){
        alert("Erro no upload: " + error.message);
        return null;
      }

      const { data } = supabase.storage.from(bucket).getPublicUrl(nomeArquivo);
      return data.publicUrl;
    }

    async function carregarTokenMP(){
      if(!APP_ID) return;

      const { data, error } = await supabase
        .from("mp_contas")
        .select("mp_access_token")
        .eq("app_id", APP_ID)
        .maybeSingle();

      if(error){
        console.error("Erro ao carregar token MP:", error);
        setStatus("Erro ao carregar token do Mercado Pago:\n" + extrairMensagemErro(error), "erro");
        return;
      }

      mpToken.value = data?.mp_access_token || "";
    }

    async function salvarTokenMP(){
  if(!APP_ID){
    throw new Error("APP_ID não carregado.");
  }

  const token = (mpToken.value || "").trim();

  if(!token){
    throw new Error("Informe o token do Mercado Pago.");
  }

  const { data, error } = await supabase
    .from("mp_contas")
    .upsert(
      [{ app_id: APP_ID, mp_access_token: token }],
      { onConflict: "app_id" }
    )
    .select();

  if(error){
    console.error("Erro ao salvar token MP:", error);
    throw new Error("Erro ao salvar token do Mercado Pago: " + (error.message || "sem detalhes"));
  }

  console.log("Token MP salvo:", data);
}

    async function removerTokenMP(){
      if(!APP_ID) return;
      if(!confirm("Remover o token do Mercado Pago desta empresa?")) return;

      const { error } = await supabase
        .from("mp_contas")
        .delete()
        .eq("app_id", APP_ID);

      if(error){
        console.error("Erro ao remover token MP:", error);
        alert("Erro ao remover token: " + extrairMensagemErro(error));
        return;
      }

      mpToken.value = "";
      setStatus("Token do Mercado Pago removido com sucesso.", "ok");
      alert("Token removido!");
    }

    async function montarLinkPublico(){
      if(!APP_ID) return;

      const { data: appData, error } = await supabase
        .from("apps")
        .select("slug")
        .eq("id", APP_ID)
        .single();

      const url = (error || !appData?.slug)
        ? `${location.origin}/passagens/publica.html?app_id=${encodeURIComponent(APP_ID)}`
        : `${location.origin}/passagens/publica.html?slug=${encodeURIComponent(appData.slug)}`;

      document.getElementById("linkPublico").innerText = url;
    }

    window.copiarLink = async function(){
      const url = document.getElementById("linkPublico").innerText;

      try{
        await navigator.clipboard.writeText(url);
        alert("🔗 Link copiado com sucesso!\n\n" + url);
      }catch{
        prompt("Copie o link:", url);
      }
    };

    async function carregarConfig(){
      if(!APP_ID) return;

      const { data, error } = await supabase
        .from("config_site")
        .select("*")
        .eq("app_id", APP_ID)
        .maybeSingle();

      if(error){
        console.error("Erro ao carregar config_site:", error);
        setStatus("Erro ao carregar config_site:\n" + extrairMensagemErro(error), "erro");
        return;
      }

      if(data){
        nome.value = data.nome_site || "";
        bannerDescricao.value = data.banner_descricao || "";
        rua.value = data.loja_rua || "";
        numero.value = data.loja_numero || "";
        cidade.value = data.loja_cidade || "";
        estado.value = data.loja_estado || "";
        telefone.value = data.telefone || "";
        tema.value = data.tema_site || "padrao";
        modoVenda.value = data.modo_venda || "whatsapp";
        whatsapp.value = data.whatsapp_numero || "";
        pixChave.value = data.pix_chave || "";
        mensagemFechado.value = data.mensagem_fechado || "";
        previewLogo.src = data.logo_url || "";
        previewBanner.src = data.banner_url || "";
      }

      await carregarTokenMP();
      alternarCamposPagamento();
      await montarLinkPublico();
    }

    async function salvarTudo(){
  try{
    if(!APP_ID){
      alert("APP_ID não carregado.");
      return;
    }

    setStatus("Salvando...");
    btnSalvar.disabled = true;
    btnSalvar.textContent = "Salvando...";

    let logoUrl = previewLogo.src || "";
    let bannerUrl = previewBanner.src || "";

    if(inputLogo.files[0]){
      const up = await uploadImagem(inputLogo.files[0], "logos");
      if(up) logoUrl = up;
    }

    if(inputBanner.files[0]){
      const up = await uploadImagem(inputBanner.files[0], "banners");
      if(up) bannerUrl = up;
    }

    const payload = {
      app_id: APP_ID,
      nome_site: nome.value.trim(),
      logo_url: logoUrl,
      banner_url: bannerUrl,
      banner_descricao: bannerDescricao.value.trim(),
      loja_rua: rua.value.trim(),
      loja_numero: numero.value.trim(),
      loja_cidade: cidade.value.trim(),
      loja_estado: estado.value.trim(),
      telefone: telefone.value.trim(),
      tema_site: tema.value,
      modo_venda: modoVenda.value,
      whatsapp_numero: whatsapp.value.trim(),
      pix_chave: pixChave.value.trim(),
      mensagem_fechado: mensagemFechado.value.trim()
    };

    const { error } = await supabase
      .from("config_site")
      .upsert(payload, { onConflict:"app_id" });

    if(error){
      console.error("Erro ao salvar config_site:", error);
      throw new Error("Erro ao salvar config_site: " + (error.message || "sem detalhes"));
    }

    if(modoVenda.value === "sistema"){
      await salvarTokenMP();
    }

    setStatus("Salvo com sucesso!");
    alert("Salvo com sucesso!");
    await carregarTokenMP();

  }catch(e){
    console.error("Erro em salvarTudo:", e);
    alert(e.message || "Erro inesperado ao salvar.");
    setStatus(e.message || "Erro ao salvar.");
  }finally{
    btnSalvar.disabled = false;
    btnSalvar.textContent = "Salvar Configurações";
  }
}

    inputLogo.addEventListener("change", () => {
      const f = inputLogo.files[0];
      if(f) previewLogo.src = URL.createObjectURL(f);
    });

    inputBanner.addEventListener("change", () => {
      const f = inputBanner.files[0];
      if(f) previewBanner.src = URL.createObjectURL(f);
    });

    async function removerLogo(){
      if(!APP_ID) return;

      const { error } = await supabase
        .from("config_site")
        .update({ logo_url:"" })
        .eq("app_id", APP_ID);

      if(error){
        alert("Erro ao remover logo: " + extrairMensagemErro(error));
        return;
      }

      previewLogo.src = "";
      inputLogo.value = "";
      setStatus("Logo removida com sucesso.", "ok");
      alert("Logo removido!");
    }

    async function removerBanner(){
      if(!APP_ID) return;

      const { error } = await supabase
        .from("config_site")
        .update({ banner_url:"" })
        .eq("app_id", APP_ID);

      if(error){
        alert("Erro ao remover banner: " + extrairMensagemErro(error));
        return;
      }

      previewBanner.src = "";
      inputBanner.value = "";
      setStatus("Banner removido com sucesso.", "ok");
      alert("Banner removido!");
    }

    window.logout = async function(){
      await supabase.auth.signOut();
      window.location.href = "/auth/login.html";
    };

    btnSalvar.addEventListener("click", salvarTudo);
    btnRemoverLogo.addEventListener("click", removerLogo);
    btnRemoverBanner.addEventListener("click", removerBanner);
    btnRemoverToken.addEventListener("click", removerTokenMP);

    (async function init(){
      await carregarAppId();
      await carregarConfig();
    })();
  </script>
</body>
</html>
